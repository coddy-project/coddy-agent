models:
  default: "openai/gpt-4o"
  agent_mode: "openai/gpt-4o"
  plan_mode: "openai/gpt-4o"

  # Listed models are exposed to ACP clients as the session "model" selector (Session Config Options).
  definitions:
    - id: "openai/gpt-4o"
      provider: "openai"
      model: "gpt-4o"
      api_key: "${OPENAI_API_KEY}"
      max_tokens: 8192
      temperature: 0.2

    # Anthropic example
    # - id: "anthropic/claude-3-5-sonnet"
    #   provider: "anthropic"
    #   model: "claude-3-5-sonnet-20241022"
    #   api_key: "${ANTHROPIC_API_KEY}"
    #   max_tokens: 8192
    #   temperature: 0.2

    # Local Ollama example
    # - id: "local/qwen"
    #   provider: "ollama"
    #   model: "qwen2.5-coder:14b"
    #   base_url: "http://localhost:11434"
    #   max_tokens: 4096
    #   temperature: 0.1

    # OpenAI-compatible (DeepSeek, Groq, Together, etc.)
    # - id: "deepseek/coder"
    #   provider: "openai_compatible"
    #   model: "deepseek-coder-v2"
    #   api_key: "${DEEPSEEK_API_KEY}"
    #   base_url: "https://api.deepseek.com/v1"
    #   max_tokens: 8192
    #   temperature: 0.1

react:
  max_turns: 30
  max_tokens_per_turn: 200000

# Optional: override where session bundles are stored (default $CODDY_HOME/sessions).
# sessions_dir: "${CODDY_HOME}/sessions"

prompts:
  # Directory containing agent.md and plan.md (Go text/template).
  # Leave empty to use built-in templates. Paths support ~ and ${CWD} (session cwd at render time).
  # Template fields: {{.CWD}}, {{.Tools}}, {{.Skills}}, {{.TodoList}}, {{.Memory}}, {{.UTCNow}}
  # (use {{if .TodoList}} ... {{end}} for optional checklist injection; see docs/config.md)
  dir: ""

skills:
  # install_dir is used by coddy skills install / coddy skills uninstall.
  # Default: $CODDY_HOME/skills (typically ~/.coddy/skills)
  install_dir: ""

  # dirs is the list of directories scanned for skills and rules.
  # Searched in order. When empty, defaults are
  # ${CODDY_HOME}/skills, ${CWD}/.skills, ~/.cursor/skills, ~/.claude/skills
  dirs: []

mcp_servers: []
  # Example: filesystem MCP server
  # - name: "filesystem"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/projects"]
  #   env: []

  # Example: GitHub MCP server
  # - name: "github"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-github"]
  #   env:
  #     - name: "GITHUB_PERSONAL_ACCESS_TOKEN"
  #       value: "${GITHUB_TOKEN}"

tools:
  # When true, run_command asks permission unless the command matches command_allowlist below.
  require_permission_for_commands: true
  require_permission_for_writes: false
  # When true, file tools reject paths outside cwd. When false, those paths are allowed
  # only after the user approves a permission prompt for that path.
  restrict_to_cwd: true

  # Commands that never require user permission.
  # Supports exact match and prefix match (prefix + space + any args).
  # Use "*" to allow all commands without asking (disables permission for commands entirely).
  command_allowlist:
    - "go build"
    - "go test"
    - "go vet"
    - "go fmt"
    - "go mod tidy"
    - "make"
    - "git status"
    - "git diff"
    - "git log"

log:
  level: "info"
  file: ""
