# Test config for Coddy examples
providers:
  - name: rpa
    type: openai
    api_base: "https://api.rpa.icu"
    api_key: "https://t.me/evilfreelancer"

models:
  - model: "rpa/gpt-oss:120b"
    max_tokens: 8192
    temperature: 0.2

agent:
  model: "rpa/gpt-oss:120b"
  max_turns: 30
  max_tokens_per_turn: 200000

sessions:
  dir: ""

skills:
  dirs: []

mcp_servers: []

tools:
  require_permission_for_commands: false
  require_permission_for_writes: false
  restrict_to_cwd: true

memory:
  enabled: true

httpserver:
  host: "127.0.0.1"
  port: 19876

logger:
  level: "warn"
  outputs: ["stderr"]
  file: ""
  format: "text"
  rotation:
    max_size_mb: 0
    max_files: 0
