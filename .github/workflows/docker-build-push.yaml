# Build distroless image (Dockerfile scratch) and push to GitHub Container Registry.
# Always tags: ghcr.io/<owner>/<repo>:<major>.<minor>.<patch>
# Also tags major.minor, major, and latest when that git tag is highest in scope.
#
# Triggers:
#   - push tag v* (commit must be on main)
#   - workflow_dispatch: uses latest SemVer git tag, checks out that commit, rebuilds and overwrites GHCR tags

name: Docker build and push

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  REGISTRY: ghcr.io
  BUILD_TAGS: "http,scheduler,ui,memory"

jobs:
  test-and-publish:
    name: Test, build distroless image, push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git tag and checkout release commit
        id: git_tag
        run: |
          set -euo pipefail
          git fetch --tags origin

          latest_semver_tag() {
            { git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true; } | sort -V | tail -1
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$(latest_semver_tag)"
            if [ -z "$TAG" ]; then
              echo "No SemVer git tags (vX.Y.Z) on origin. Merge a PR (tag-on-merge) or push a tag first." >&2
              echo "Tags visible after fetch:" >&2
              git tag -l >&2 || true
              exit 1
            fi
            echo "Manual run: latest SemVer tag is ${TAG}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match v<major>.<minor>.<patch> (got ${TAG})." >&2
            exit 1
          fi

          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git checkout --force "$TAG"
          echo "Building commit $(git rev-parse --short HEAD) at ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: external/ui/package-lock.json

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Ensure tag is on main
        id: gate
        run: |
          TAG="${{ steps.git_tag.outputs.tag }}"
          git fetch origin main --tags
          TAG_SHA="$(git rev-parse "${TAG}^{commit}")"
          if git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "Tag ${TAG} is on main."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} (${TAG_SHA}) is not on branch main; skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.gate.outputs.skip != 'true'
        run: make test

      - name: Compute image tags
        id: meta
        if: steps.gate.outputs.skip != 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          set -euo pipefail
          GIT_TAG="${{ steps.git_tag.outputs.tag }}"
          IMAGE="${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          VERSION="${GIT_TAG#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"

          mapfile -t ALL_TAGS < <({ git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true; } | sort -V)
          if [ "${#ALL_TAGS[@]}" -eq 0 ]; then
            echo "No SemVer tags found." >&2
            exit 1
          fi

          MAX_ALL="${ALL_TAGS[$((${#ALL_TAGS[@]} - 1))]}"

          mapfile -t MM_TAGS < <(printf '%s\n' "${ALL_TAGS[@]}" | grep -E "^v${MAJOR}\\.${MINOR}\\.[0-9]+$" | sort -V)
          MAX_MM="${MM_TAGS[$((${#MM_TAGS[@]} - 1))]}"

          mapfile -t MAJ_TAGS < <(printf '%s\n' "${ALL_TAGS[@]}" | grep -E "^v${MAJOR}\\.[0-9]+\\.[0-9]+$" | sort -V)
          MAX_MAJ="${MAJ_TAGS[$((${#MAJ_TAGS[@]} - 1))]}"

          TAGS="${IMAGE}:${VERSION}"
          echo "Always push (overwrite): ${IMAGE}:${VERSION}"

          if [ "$GIT_TAG" = "$MAX_MM" ]; then
            TAGS+=$'\n'"${IMAGE}:${MAJOR}.${MINOR}"
            echo "Also push (overwrite): ${IMAGE}:${MAJOR}.${MINOR}"
          else
            echo "Skip ${IMAGE}:${MAJOR}.${MINOR} (max is ${MAX_MM})."
          fi

          if [ "$GIT_TAG" = "$MAX_MAJ" ]; then
            TAGS+=$'\n'"${IMAGE}:${MAJOR}"
            echo "Also push (overwrite): ${IMAGE}:${MAJOR}"
          else
            echo "Skip ${IMAGE}:${MAJOR} (max is ${MAX_MAJ})."
          fi

          if [ "$GIT_TAG" = "$MAX_ALL" ]; then
            TAGS+=$'\n'"${IMAGE}:latest"
            echo "Also push (overwrite): ${IMAGE}:latest"
          else
            echo "Skip latest (global max is ${MAX_ALL})."
          fi

          {
            echo "version=${VERSION}"
            echo "push=true"
            echo "tags<<EOF"
            printf '%s\n' "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.meta.outputs.push == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push distroless image
        if: steps.meta.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_TAGS=${{ env.BUILD_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
